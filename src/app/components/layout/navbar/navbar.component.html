<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="principal/dashboard">TechPro</a>

    <div
      class="collapse navbar-collapse"
      id="navbarSupportedContent"
      mdbCollapse
      #basicNavbar="mdbCollapse"
    >
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" href="principal/itens"
            [class.active-link]="isActive('itens')">
            <i class="fas fa-boxes me-1"></i> Itens
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="principal/transacoes"
            [class.active-link]="isActive('transacoes')">
            <i class="fas fa-exchange-alt me-1"></i> Transações
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="principal/extratos"
            [class.active-link]="isActive('extratos')">
            <i class="fas fa-file-invoice-dollar me-1"></i> Extratos
          </a>
        </li>
        <li class="nav-item" *ngIf="isDemandante()">
          <a class="nav-link" href="principal/usuarios/new"
            [class.active-link]="isActive('usuarios')">
            <i class="fas fa-user-plus me-1"></i> Cadastrar Usuário
          </a>
        </li>
        <li class="nav-item" *ngIf="isDemandante()">
          <a class="nav-link" href="principal/cadastros"
            [class.active-link]="isActive('cadastros')">
            <i class="fas fa-users-cog me-1"></i> Cadastros
          </a>
        </li>
        <li class="nav-item" *ngIf="isDemandante()">
          <a class="nav-link" href="principal/auditoria"
            [class.active-link]="isActive('auditoria')">
            <i class="fas fa-shield-alt me-1"></i> Auditoria
          </a>
        </li>
      </ul>
      <ul class="navbar-nav d-flex align-items-center gap-2">

        <!-- Botão alternar tema -->
        <li class="nav-item">
          <button
            class="btn-tema"
            (click)="alternarTema()"
            [title]="isDarkMode() ? 'Mudar para modo claro' : 'Mudar para modo escuro'"
          >
            <i [class]="isDarkMode() ? 'fas fa-sun' : 'fas fa-moon'"></i>
          </button>
        </li>

        <li class="nav-item position-relative">
          <div
            class="user-avatar"
            (click)="toggleDropdown()"
            [class.active]="dropdownAberto"
          >
            {{ getIniciais() }}
          </div>

          <div
            class="profile-dropdown"
            [class.show]="dropdownAberto"
            (click)="$event.stopPropagation()"
          >
            <div class="dropdown-header-custom">
              <div class="user-info">
                <div class="user-avatar-large">
                  {{ getIniciais() }}
                </div>
                <div class="user-details">
                  <strong>{{ getNomeUsuario() }}</strong>
                  <small>{{ getEmailUsuario() }}</small>
                  <span
                    class="badge"
                    [class.badge-primary]="isDemandante()"
                    [class.badge-info]="!isDemandante()"
                  >
                    {{ getTipoUsuario() }}
                  </span>
                </div>
              </div>
            </div>

            <hr class="dropdown-divider-custom" />

            <div class="dropdown-item-custom" (click)="alternarTema()">
              <i [class]="isDarkMode() ? 'fas fa-sun me-2' : 'fas fa-moon me-2'"></i>
              {{ isDarkMode() ? 'Modo Claro' : 'Modo Escuro' }}
            </div>

            <hr class="dropdown-divider-custom" />

            <div class="dropdown-item-custom" (click)="sair()">
              <i class="fas fa-sign-out-alt me-2"></i>
              Sair
            </div>
          </div>
          <div
            class="dropdown-overlay"
            *ngIf="dropdownAberto"
            (click)="fecharDropdown()"
          ></div>
        </li>
      </ul>
    </div>
  </div>
</nav>
